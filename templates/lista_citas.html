{% extends "base.html" %}

{% block title %}Lista de citas{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto space-y-4">
	<div class="flex items-center justify-between flex-wrap gap-3">
		<div class="flex items-center gap-3">
			<a href="{{ url_for('main.calendario') }}" class="w-9 h-9 flex items-center justify-center rounded-xl bg-white border border-primary/20 text-primary shadow-sm hover:bg-primary/10 transition" aria-label="Volver al calendario">
				<i class="fas fa-arrow-left text-sm"></i>
			</a>
			<div>
				<h2 class="text-xl font-semibold text-gray-800">Citas programadas</h2>
				<p class="text-gray-400 text-xs">Confirma, cancela o escribe por WhatsApp.</p>
			</div>
		</div>
		<div class="flex gap-2">
			<button id="filtro-hoy" class="px-3 py-2 bg-white border border-primary/20 text-primary/70 rounded-xl text-sm hover:bg-primary/10 transition">Hoy</button>
			<button id="filtro-todas" class="px-3 py-2 bg-primary text-white rounded-xl text-sm shadow-md">Todas</button>
		</div>
	</div>

	<div id="citas-lista" class="space-y-3"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
	const cont = document.getElementById('citas-lista');
	const btnHoy = document.getElementById('filtro-hoy');
	const btnTodas = document.getElementById('filtro-todas');

	async function load(filtroHoy=false){
		cont.innerHTML = '<p>Cargando...</p>';
		const params = new URLSearchParams();
		if(filtroHoy){
			const hoy = new Date();
			const f = hoy.toISOString().slice(0,10);
			params.set('fecha_inicio', f);
			params.set('fecha_fin', f);
		}
		try{
			const data = await fetchAPI('/api/citas/todas' + (params.toString()?`?${params.toString()}`:''));
			render(data);
		}catch(e){ cont.innerHTML = '<p class="text-red-500">Error al cargar</p>'; }
	}

	function render(data){
		if(!data || data.length===0){ cont.innerHTML = '<p>No hay citas.</p>'; return; }
		cont.innerHTML='';
		data.forEach(c=>{
			const card = document.createElement('div');
			card.className = 'bg-white border rounded-xl p-3 shadow-sm';
			card.innerHTML = `
				<div class="flex justify-between items-start gap-2">
					<div>
						<div class="font-semibold">${c.paciente_nombre}</div>
						<div class="text-xs text-gray-600">${c.tipo}</div>
						<div class="text-xs text-gray-500">${c.fecha_formateada} · ${c.hora_formateada}</div>
					</div>
					<span class="text-xs px-2 py-1 rounded bg-green-50 text-green-700">${c.estado}</span>
				</div>
				<div class="mt-2 flex gap-2 text-xs">
					<button class="action px-2 py-1 rounded bg-green-100 text-green-700" data-id="${c.id}" data-act="confirmar">Confirmar</button>
					<button class="action px-2 py-1 rounded bg-red-100 text-red-700" data-id="${c.id}" data-act="cancelar">Cancelar</button>
					<button class="action px-2 py-1 rounded bg-blue-100 text-blue-700" data-id="${c.id}" data-act="whatsapp">WhatsApp</button>
				</div>
			`;
			cont.appendChild(card);
		});
		cont.querySelectorAll('.action').forEach(btn=>{
			btn.addEventListener('click', async (e)=>{
				const id = e.target.dataset.id;
				const act = e.target.dataset.act;
				if(act==='confirmar'){
					await fetchAPI(`/api/citas/${id}/confirmar`, {method:'POST'});
					showToast('Cita confirmada');
				} else if(act==='cancelar'){
					await fetchAPI(`/api/citas/${id}/cancelar`, {method:'POST'});
					showToast('Cita cancelada','warning');
				} else if(act==='whatsapp'){
					const res = await fetchAPI(`/api/citas/${id}/whatsapp`);
					if(res.whatsapp_link) window.open(res.whatsapp_link,'_blank');
				}
				load(btnHoy.classList.contains('active'));
			});
		});
	}

	btnHoy.addEventListener('click', ()=>{ btnHoy.classList.add('active'); btnTodas.classList.remove('active'); load(true); });
	btnTodas.addEventListener('click', ()=>{ btnHoy.classList.remove('active'); btnTodas.classList.add('active'); load(false); });

	load(false);
});
</script>
{% endblock %}
